inputs:
  in_microsoft_foundry_cribl_integration:
    disabled: true
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    brokers:
      - YOUR_EVENTHUB_NAMESPACE.servicebus.windows.net
    topics:
      - microsoft-foundry-cribl-integration
    groupId: Cribl
    fromBeginning: true
    connectionTimeout: 10000
    requestTimeout: 60000
    maxRetries: 5
    maxBackOff: 30000
    initialBackoff: 300
    backoffRate: 2
    authenticationTimeout: 10000
    reauthenticationThreshold: 10000
    sasl:
      disabled: false
      mechanism: oauthbearer
      oauthEndpoint: https://login.microsoftonline.com
      clientSecretAuthType: manual
      authType: secret
      username: $ConnectionString
      password: changeme
      scope: https://YOUR_EVENTHUB_NAMESPACE.servicebus.windows.net/.default
      clientId: YOUR_CLIENT_ID
      tenantId: YOUR_TENANT_ID
      clientSecret: YOUR_CLIENT_SECRET
    tls:
      disabled: false
      rejectUnauthorized: true
    sessionTimeout: 30000
    rebalanceTimeout: 60000
    heartbeatInterval: 3000
    maxBytesPerPartition: 1048576
    maxBytes: 10485760
    maxSocketErrors: 0
    minimizeDuplicates: false
    type: eventhub
    metadata:
      - name: __packsource
        value: "'cribl-microsoft-foundry-eventhub-io.agent-events'"
    pipeline: azure_eventhub_unroll_and_timestamp
